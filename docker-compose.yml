# ==============================================================================
# PHÂN BỔ KIẾN TRÚC - GIAI ĐOẠN TEST/DEV
# - Qdrant (Vector DB): Chạy Docker Local (Cô lập dữ liệu, dễ build lại)
# - Neo4j (Graph DB): Chạy Docker Local (Giới hạn RAM, truy cập qua Browser)
# - Redis (Memory): Chạy Docker Local (Chạy ngầm nhẹ nhàng)
#
# CÁC THÀNH PHẦN HOẠT ĐỘNG BÊN NGOÀI DOCKER:
# - Backend (FastAPI): Chạy trực tiếp từ IDE để debug LangGraph state.
# - Frontend (Next.js): Chạy qua Terminal (npm run dev) để hot-reload.
# - Internal APIs (LLM, Embedding, Reranker): Chạy trên Server 10.9.3.75
# ==============================================================================

services:
  redis:
    image: redis:7-alpine
    container_name: legal-rag-redis-nam
    ports:
      - "6380:6379"
    volumes:
      - local_redis_data_nam:/data
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: legal-rag-qdrant-nam
    ports:
      - "6337:6333"
      - "6338:6334"
    volumes:
      - qdrant_local_storage_nam:/qdrant/storage
      - qdrant_local_snapshots_nam:/qdrant/snapshots
    restart: always
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    stop_grace_period: 2m
    # Healthcheck tạm thời được tắt để Qdrant tập trung recovery 15GB dữ liệu mà không bị Docker can thiệp
    # healthcheck:
    #   test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 20

  neo4j:
    image: neo4j:5.20.0
    container_name: legal-rag-neo4j-nam
    ports:
      - "7475:7474" # Giao diện Neo4j Browser trên trình duyệt
      - "7688:7687"
    environment:
      - NEO4J_AUTH=neo4j/u7aGQYEWeFJD-jyeHB4ATtoAud73PptW35M1RzFlT-0
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_pagecache_size=2G
      - NEO4J_server_memory_heap_initial__size=2G
      - NEO4J_server_memory_heap_max__size=4G
    volumes:
      - neo4j_data_nam:/data
      - neo4j_logs_nam:/logs
      - neo4j_import_nam:/var/lib/neo4j/import
      - neo4j_plugins_nam:/plugins
    restart: always
    deploy:
      resources:
        limits:
          memory: 6G

  # --- TEST ONLY: Neo4j riêng cho test pipeline (500 VB y tế) ---
  # Browser: http://IP:7476 | Bolt: bolt://localhost:7689
  # Dữ liệu cô lập hoàn toàn, không đụng production
  neo4j-test:
    image: neo4j:5.20.0
    container_name: legal-rag-neo4j-test
    ports:
      - "7476:7474" # Browser: http://IP:7476
      - "7689:7687" # Bolt:    bolt://localhost:7689
    environment:
      - NEO4J_AUTH=neo4j/test_neo4j_pass
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_pagecache_size=512M
      - NEO4J_server_memory_heap_initial__size=512M
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - neo4j_test_data:/data
      - neo4j_test_logs:/logs
      - neo4j_test_plugins:/plugins
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  postgres:
    image: postgres:16-alpine
    container_name: legal-rag-postgres-nam
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: legal_rag
      POSTGRES_PASSWORD: legal_rag_secret
      POSTGRES_DB: legal_chat_history
    volumes:
      - postgres_data_nam:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal_rag -d legal_chat_history"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  local_redis_data_nam:
  qdrant_local_storage_nam:
  qdrant_local_snapshots_nam:
  neo4j_data_nam:
  neo4j_logs_nam:
  neo4j_import_nam:
  neo4j_plugins_nam:
  neo4j_test_data:
  neo4j_test_logs:
  neo4j_test_plugins:
  postgres_data_nam:
