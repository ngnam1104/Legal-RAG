# ==============================================================================
# PHÂN BỔ KIẾN TRÚC - GIAI ĐOẠN TEST/DEV
# - Qdrant (Vector DB): Chạy Docker Local (Cô lập dữ liệu, dễ build lại)
# - Neo4j (Graph DB): Chạy Docker Local (Giới hạn RAM, truy cập qua Browser)
# - Redis (Memory): Chạy Docker Local (Chạy ngầm nhẹ nhàng)
#
# CÁC THÀNH PHẦN HOẠT ĐỘNG BÊN NGOÀI DOCKER:
# - Backend (FastAPI): Chạy trực tiếp từ IDE để debug LangGraph state.
# - Frontend (Next.js): Chạy qua Terminal (npm run dev) để hot-reload.
# - Internal APIs (LLM, Embedding, Reranker): Chạy trên Server 10.9.3.75
# ==============================================================================

services:
  redis:
    image: redis:7-alpine
    container_name: legal-rag-redis-nam
    ports:
      - "6380:6379"
    volumes:
      - local_redis_data_nam:/data
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: legal-rag-qdrant-nam
    ports:
      - "6337:6333"
      - "6338:6334"
    volumes:
      - qdrant_local_storage_nam:/qdrant/storage
      - qdrant_local_snapshots_nam:/qdrant/snapshots
    restart: always
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    stop_grace_period: 2m
    # Healthcheck tạm thời được tắt để Qdrant tập trung recovery 15GB dữ liệu mà không bị Docker can thiệp
    # healthcheck:
    #   test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 20

  neo4j:
    image: neo4j:5.20.0
    container_name: legal-rag-neo4j-nam
    ports:
      - "7475:7474" # Giao diện Neo4j Browser trên trình duyệt
      - "7688:7687"
    environment:
      # Khớp với mật khẩu trong .env để dễ quản lý
      - NEO4J_AUTH=neo4j/u7aGQYEWeFJD-jyeHB4ATtoAud73PptW35M1RzFlT-0
      - NEO4J_PLUGINS=["apoc"]
      # Giới hạn RAM phù hợp với server 18GB (Tránh đụng RAM của Qdrant)
      - NEO4J_server_memory_pagecache_size=2G
      - NEO4J_server_memory_heap_initial__size=2G
      - NEO4J_server_memory_heap_max__size=4G
    volumes:
      - neo4j_data_nam:/data
      - neo4j_logs_nam:/logs
      - neo4j_import_nam:/var/lib/neo4j/import
      - neo4j_plugins_nam:/plugins
    restart: always
    deploy:
      resources:
        limits:
          memory: 6G

volumes:
  local_redis_data_nam:
  qdrant_local_storage_nam:
  qdrant_local_snapshots_nam:
  neo4j_data_nam:
  neo4j_logs_nam:
  neo4j_import_nam:
  neo4j_plugins_nam:

    # NOTE: Khi chạy backend trong Docker, mount volume cho SQLite:
    # docker run -v ./backend/data:/app/backend/data ...
    # Hoặc thêm volume vào service backend nếu có:
    #   volumes:

